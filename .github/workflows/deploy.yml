name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/mock-app
            sudo git pull origin main
            sudo npm install --omit=dev
            sudo pm2 restart mock-app
            echo "Deployed successfully at $(date)"

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            TEXT="$EMOJI Mock-app deployed to production (EC2)\nBranch: main\nCommit: ${{ github.sha }}"
          else
            EMOJI="❌"
            TEXT="$EMOJI Mock-app deployment failed!\nCheck GitHub Actions logs."
          fi
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"${TEXT}\"}" \
            ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK_URL }} || true
